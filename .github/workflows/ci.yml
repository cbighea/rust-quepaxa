name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust 1.88
        run: rustup toolchain install 1.88.0 --profile minimal --component clippy,rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --all-targets --features network -- -D warnings
      - name: Check dependency-free targets
        run: cargo check --no-default-features --all-targets
      - name: Build optimized benchmark
        run: cargo bench --features network --bench consensus --no-run

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust 1.88
        run: rustup toolchain install 1.88.0 --profile minimal
      - name: Test core
        run: cargo test
      - name: Test network layer
        run: cargo test --features network
      - name: Test documentation
        run: cargo test --features network --doc

  security:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust 1.88
        run: rustup toolchain install 1.88.0 --profile minimal
      - name: Generate dependency lockfile
        run: cargo generate-lockfile
      - name: Install audit tools
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo install cargo-deny --version 0.20.2 --locked
      - name: Check RustSec advisories
        run: cargo audit --file Cargo.lock
      - name: Check dependency policy
        run: cargo deny --all-features --locked check advisories bans licenses sources
